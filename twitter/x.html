<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        main{
            height: 90vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        body{
            background: black;
            color: white;
        }
        h1{
            font-size: 100px;
            width: 50%;
            margin-left: 200px;
            padding-top: 90px;
        }
        button{
            border-radius: 25px;
            display: flex;
            grid-template-columns: column;
            justify-content: center;
            padding: 20px;
            margin: 50px;
            width: 70%;
            margin-left: 200px;
        }
        input{
            border-radius: 25px;
            display: flex;
            margin: 15px;
            padding: 20px;
            width: 70%;
            margin-left: 200px;
        }
        hr{
            display: flex;
            align-items: center;
            margin-left: 200px;
            width: 70%;
        }
        p{
            margin-left: 200px;
        }
        img{
            padding: 10px;
            margin-left: 70px;
        }

    </style>
</head>
<body>
    <main>
            <div class="left">
            <h1>Happening now.</h1>

            <p>By continuing, you agree to our Terms of Service,Privacy Policy  and Cookie Use</p>
            </div>
