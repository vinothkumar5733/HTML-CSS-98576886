<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>operator</title>
</head>
<body>
    <script>
        let i = 10;
        console.log(i);

        let j = 20;
        i = 20; 
        console.log(j);

        j = 30;
        console.log(j);

        const k = 400;
        console.log(k);

        i = 50;
        i = 60;
        console.log(i);

        let r = 1000;
        let h = "5";
        console.log(r + h); 

        let a = 100;
        a++;
        console.log(a);

        let n = 200;
        n--;
        console.log(n);

        </script>
</body>
</html>
