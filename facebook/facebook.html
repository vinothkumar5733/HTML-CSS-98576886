<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            border: 0;
            margin: 0%;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        .left{
            /* border: 1px solid red; */
            display: grid;
            grid-template-columns: 1fr 1fr;

        }

        .right{
            /* border-left: 1px solid grey; */
            display: flex;
            flex-direction: column;
            margin: auto;
            gap: 30px;
            width: 50vh;
        }
        main{
            
            display: grid;
            grid-template-columns: 2fr 1fr;
            height: 90vh;
        }
        footer{
            height: 10vh;
        }
        .logo{
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;

        }

        img{
            width: 100px;
            height: 100px;
        }
        h1{
            font-size: 74px;
            width: 50%;
        }
        .image img{
            width: 90vh;
            height: 90vh;
            display: flex;
            align-items: center;
        }
        .login{
            display: flex;
        }
        input{
            width: 100%;
            height: 10%;
            border: 2px solid grey;
            border-radius: 10px;
            padding: 15px;
        }
        #CreateNewAccount{
            border-radius: 25px;
            padding: 5px;
            cursor: pointer;
            color: #1877F2;
            border-color: 2px solid #1877F2;


        }
        #Login{
            border-radius: 25px;
            background-color: #1877F2;
            color: white;
            padding: 5px;
            cursor: pointer;
        }
        #ForgottenPassword{
            border-radius: 25px;
            background-color: white;
            cursor: pointer;

        }
    </style>
</head>
<body>
    <main>
        <div class="left">
            <div class="logo">
                <img src="OIP.jpg" alt="">
            <h1>Explore the things you love.</h1>
        </div>

        <div class="image">
            <img src="fc.logo.webp" alt="">
        </div>
    </div>
        <div class="right">
            <p>Log in to Facebook</p>
            <input type="text" placeholder="Email address or mobile number">
            <input type="password" placeholder="Passsword">
            <button id="Login">Log in</button>
            <button id="ForgottenPassword">Forgotten Password</button>
            <button id="CreateNewAccount">Create New Account</button>
        </div>
    </main>
</body>
</html>
