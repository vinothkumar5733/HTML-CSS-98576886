        *{
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        .container{
            border:1px solid grey;
            height:100vh;
            width: 100vw;
        }

        .mid{
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        .left{
            border: 1px solid grey;
        }
        .right{
            border: 1px solid grey;
            padding-left: 100px;
            padding-top: 20%;

        }
        footer{
            /* border:1px solid red; */
            height: 10vh;
            font-size: 20px;
            text-align: center;
            padding-top: 10px;

        }


        input{
            border: 2px solid grey;
            width: 90%;
            height: 13%;
            font-size: larger;
            border-radius: 25px;
            margin-top: 25px;  
            padding-left: 2%; 
        }
        button{
            border: 2px solid grey;
            width: 90%;
            height: 13%;
            background-color: rgb(16, 89, 199);
            font-weight: 500;
            margin-top: 25px; 
            text-align: center;
            color: white;
            border-radius: 25px;
            font-size: 20px;
            cursor: pointer;
        }
        .newbutton{
            border: 2px solid grey;
            width: 90%;
            height: 10%;
            background-color: white;
            font-weight: 500;
            text-align: center;
            color: blue;
            border-radius: 25px;
            font-weight: bold;

        }
        h3{
            width: 90%;
            text-align: center;
            margin-top: 25px;
        }
        p{
            color: blue;
        }

        .ak{

         height: 7%;
         width: 90%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
}
.logo{
margin:25px;

    height: 15vh;
}
